---
- name: Setup K3s Control Plane (Master)
  hosts: master
  become: yes
  tasks:
    - name: Instalar K3s no Master
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Capturar o token de acesso do nó
      command: cat /var/lib/rancher/k3s/server/node-token
      register: node_token
      changed_when: false

    - name: Salvar Master IP
      set_fact:
        master_ip: "{{ ansible_host }}"

    - name: Salvar Token
      set_fact:
        k3s_token: "{{ node_token.stdout }}"

- name: Setup K3s Workers
  hosts: workers
  become: yes
  tasks:
    - name: Instalar K3s nos Workers e conectar ao Master
      shell: curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['master'][0]]['master_ip'] }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_token'] }} sh -
      args:
        creates: /etc/systemd/system/k3s-agent.service